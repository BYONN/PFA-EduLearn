<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode Maintenance | EduLearn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .maintenance-card {
            border-radius: 24px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 40px;
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            background-color: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 24px;
            font-size: 2.5rem;
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="maintenance-card mx-auto">
            <div class="icon-wrapper">
                <i class='bx bx-wrench bx-flashing'></i>
            </div>
            <h2 class="fw-bold mb-3">Plateforme en Maintenance</h2>
            <p class="text-secondary mb-4">
                EduLearn subit actuellement une mise à jour programmée ou des travaux d'amélioration. Nous serons de retour très bientôt !
            </p>
            <div class="border-top pt-4 text-secondary small">
                <i class='bx bx-info-circle align-middle me-1'></i> Merci pour votre patience.
            </div>
        </div>
    </div>
</body>
</html>
